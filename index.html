<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GROUPIES — Interactive Cartoon House</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-content">
      <div class="loader-house">🏠</div>
      <h1 class="loader-title">GROUPIES</h1>
      <p class="loader-sub">Loading the chaos...</p>
      <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>
  </div>

  <!-- Main Canvas -->
  <canvas id="canvas"></canvas>

  <!-- HUD Buttons -->
  <div id="hud" class="hidden">
    <button id="btn-exit" class="hud-btn" title="Go Outside">🏠 Exit</button>
    <button id="btn-radio" class="hud-btn" title="Open Radio">📻 Radio</button>
    <button id="btn-help" class="hud-btn" title="Help">❓</button>
  </div>

  <!-- Hint -->
  <div id="hint" class="hidden">
    <span>🖱️ Click the <strong>door</strong> to enter • Click <strong>characters</strong> to talk</span>
  </div>

  <!-- Dialogue Bubble -->
  <div id="dialogue-bubble" class="hidden">
    <div class="bubble-arrow"></div>
    <p id="dialogue-text"></p>
    <span class="bubble-name" id="dialogue-name"></span>
  </div>

  <!-- Radio UI Panel -->
  <div id="radio-panel" class="hidden">
    <div class="panel-header">
      <span class="panel-title">📻 Groupies FM</span>
      <button id="radio-close" class="close-btn">✕</button>
    </div>
    <div class="station-list">
      <button class="station-btn active" data-station="0">🎵 Groupies FM</button>
      <button class="station-btn" data-station="1">🍳 Kitchen Radio</button>
      <button class="station-btn" data-station="2">🐱 DXIO Cat Freq</button>
      <button class="station-btn" data-station="3">🌙 Night Mode</button>
    </div>
    <div class="controls">
      <button id="radio-prev" class="ctrl-btn">⏮</button>
      <button id="radio-play" class="ctrl-btn play">▶</button>
      <button id="radio-next" class="ctrl-btn">⏭</button>
    </div>
    <div class="vol-row">
      <span>🔈</span>
      <input type="range" id="vol-slider" min="0" max="100" value="60" />
      <span>🔊</span>
    </div>
    <div class="now-playing">
      <div class="np-disc">🎶</div>
      <div class="np-info">
        <div id="np-title">— select a station —</div>
        <div id="np-artist" class="np-artist">Groupies Radio</div>
      </div>
    </div>
    <p class="radio-note">🎧 Audio uses Web Audio API tones (no files needed)</p>
  </div>

  <!-- Overlay for radio -->
  <div id="overlay" class="hidden"></div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
